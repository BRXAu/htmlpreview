<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Banner preview</title>
<style>
  body { font-family: sans-serif; background:#111; color:#eee; margin:0; padding:20px; }
  h1 { margin-bottom:20px; }
  .controls { margin-bottom:20px; display:flex; flex-wrap:wrap; gap:10px; }
  .controls button {
    padding:6px 12px; cursor:pointer;
    border:none; background:#ffcc00; border-radius:4px; font-weight:bold;
  }
  .container { display:flex; flex-wrap:wrap; gap:20px; }
  .banner { display:flex; flex-direction:column; align-items:center; background:#222; padding:10px; border-radius:6px; }
  iframe { border:1px solid #444; display:block; }
  .banner button { margin-top:6px; padding:4px 10px; cursor:pointer; border:none; background:#ffcc00; border-radius:4px; }
</style>
</head>
<body>

<h1>Banner preview</h1>

<div class="controls" id="controls"></div>
<div class="container" id="container"></div>

<script>

const files = [
"TBA0450_160x600_ClickTag.html",
"TBA0450_300x100_ClickTag.html",
"TBA0450_300x250_ClickTag.html",
"TBA0450_300x400_ClickTag.html",
"TBA0450_300x450_ClickTag.html",
"TBA0450_300x50_ClickTag.html",
"TBA0450_300x600_ClickTag.html",
"TBA0450_320x100_ClickTag.html",
"TBA0450_320x480_ClickTag.html",
"TBA0450_320x50_ClickTag.html",
"TBA0450_480x320_ClickTag.html",
"TBA0450_728x90_ClickTag.html",
"TBA0450_800x600_ClickTag.html",
"TBA0450_900x500_ClickTag.html",
"TBA0450_970x250_ClickTag.html"
];

function getSize(file){
  const match = file.match(/(\d+)x(\d+)/);
  return match ? { w: match[1], h: match[2], label: match[0] } : { w:300, h:250, label:"unknown" };
}

function loadFiles(selected){
  const container = document.getElementById("container");
  container.innerHTML = "";

  selected.forEach(file => {
    const {w,h,label} = getSize(file);

    const wrap = document.createElement("div");
    wrap.className = "banner";

    wrap.innerHTML = `
      <strong>${label}</strong>
      <iframe src="${file}" width="${w}" height="${h}"></iframe>
      <button onclick="this.previousElementSibling.src='${file}'">Reload</button>
    `;

    container.appendChild(wrap);
  });
}

function createButtons(){
  const controls = document.getElementById("controls");

  const allBtn = document.createElement("button");
  allBtn.textContent = "All";
  allBtn.onclick = () => loadFiles(files);
  controls.appendChild(allBtn);

  files.forEach(file => {
    const {label} = getSize(file);
    const btn = document.createElement("button");
    btn.textContent = label;
    btn.onclick = () => loadFiles([file]);
    controls.appendChild(btn);
  });
}

createButtons();
loadFiles(files);

</script>

</body>
</html>
