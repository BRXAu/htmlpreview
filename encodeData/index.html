<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Text encoder / decoder</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      max-width: 700px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    button {
      margin-right: 10px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    #output, #keyDisplay {
      margin-top: 16px;
      padding: 12px;
      border: 1px solid #ccc;
      height: 60px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 13px;
      overflow: hidden;
    }
  </style>
</head>
<body>

<h1>Text encoder / decoder</h1>

<textarea id="input" placeholder="Enter text here"></textarea>

<div>
  <button id="encodeBtn">Encode</button>
  <button id="decodeBtn">Decode</button>
  <button id="newKeyBtn">New substitution key</button>
  <button id="scrambleBtn">Scramble text</button>
  <button id="unscrambleBtn">Unscramble text</button>
  <button id="minifyBtn">Minify text</button>
  <button id="copyBtn">Copy output</button>
</div>

<h3>Output</h3>
<div id="output"></div>

<h3>Conversion key</h3>
<div id="keyDisplay"></div>

<script>
const charset =
  "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .,!?<>/-{};[]'\"";

let shuffled = shuffleString(charset);
let scrambleKey = [];

// --- helpers ---
function shuffleString(str) {
  const arr = str.split("");
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.join("");
}

function buildMaps() {
  return {
    encodeMap: Object.fromEntries(
      charset.split("").map((c, i) => [c, shuffled[i]])
    ),
    decodeMap: Object.fromEntries(
      shuffled.split("").map((c, i) => [c, charset[i]])
    )
  };
}

function displayKey() {
  document.getElementById("keyDisplay").textContent =
    "CHARSET : " + charset + "\n\n" +
    "SHUFFLED: " + shuffled;
}

// --- substitution encode/decode ---
function encode(text) {
  const { encodeMap } = buildMaps();
  return text.split("").map(c => encodeMap[c] || c).join("");
}

function decode(text) {
  const { decodeMap } = buildMaps();
  return text.split("").map(c => decodeMap[c] || c).join("");
}

// --- scramble ---
function scramble(text) {
  const arr = text.split("");
  scrambleKey = arr.map((_, i) => i);

  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
    [scrambleKey[i], scrambleKey[j]] = [scrambleKey[j], scrambleKey[i]];
  }

  document.getElementById("keyDisplay").textContent =
    "SCRAMBLE KEY (index map):\n" + JSON.stringify(scrambleKey);

  return arr.join("");
}

function unscramble(text) {
  const arr = text.split("");
  const result = [];

  scrambleKey.forEach((originalIndex, i) => {
    result[originalIndex] = arr[i];
  });

  return result.join("");
}

// --- minify (updates input) ---
function minify() {
  const input = document.getElementById("input");
  input.value = input.value
    .replace(/\s+/g, " ")
    .trim();
}

// --- copy output ---
function copyOutput() {
  const output = document.getElementById("output").textContent;
  navigator.clipboard.writeText(output);
}

// --- UI ---
const input = document.getElementById("input");
const output = document.getElementById("output");

document.getElementById("encodeBtn").onclick = () => {
  output.textContent = encode(input.value);
};

document.getElementById("decodeBtn").onclick = () => {
  output.textContent = decode(input.value);
};

document.getElementById("newKeyBtn").onclick = () => {
  shuffled = shuffleString(charset);
  displayKey();
};

document.getElementById("scrambleBtn").onclick = () => {
  output.textContent = scramble(input.value);
};

document.getElementById("unscrambleBtn").onclick = () => {
  output.textContent = unscramble(input.value);
};

document.getElementById("minifyBtn").onclick = () => {
  minify();
};

document.getElementById("copyBtn").onclick = () => {
  copyOutput();
};

// init
displayKey();
</script>

</body>
</html>
