<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MREC iOS Safe Version</title>

  <!-- Stops iOS auto-linking numbers -->
  <meta name="format-detection" content="telephone=no">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .ad {
      width: 300px;
      height: 250px;
      border: 1px solid #000;
      padding: 12px;
      box-sizing: border-box;
    }

    h2 {
      font-size: 18px;
      margin: 0 0 10px 0;
    }

    p {
      font-size: 14px;
      margin: 6px 0;
    }

    .nowrap {
      white-space: nowrap;
    }

    button {
      margin-top: 10px;
      padding: 8px 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="ad">
    <h2>Travel Deal 2026</h2>

    <p>Limited offer for 2026 bookings</p>

    <p>
      Call 1800 2026 500 for details
    </p>

    <p>
      Reference code:
      2026 FALL PROMO
    </p>

    <button>Book Now</button>
  </div>

</body>
</html>
