<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EDM Preview Side by Side</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #FFFFFF;
    }

    .preview-container {
      display: flex;
      gap: 20px; /* space between desktop and mobile */
      flex-wrap: wrap; /* wrap on small screens */
    }

    .iframe-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .iframe-label {
      font-weight: bold;
      margin-bottom: 5px;
    }

    iframe {
      border: 1px solid #ccc;
    }

    .toggle-button {
      margin-bottom: 20px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #333;
      background: #fff;
      color: #000;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <button class="toggle-button" onclick="toggleDark()">Toggle Dark Mode</button>
  <button class="toggle-button" onclick="toggleImages()">Toggle Images</button>

  <div class="preview-container">

    <!-- Desktop Preview -->
    <div class="iframe-wrapper">
      <span class="iframe-label">Desktop</span>
      <iframe id="desktop-frame" src="edm.html" width="640" height="1480" title="Desktop EDM Preview"></iframe>
    </div>

    <!-- Mobile Preview -->
<!--     <div class="iframe-wrapper">
      <span class="iframe-label">Mobile</span>
      <iframe id="mobile-frame" src="edm.html" width="300" height="1140" title="Mobile EDM Preview"></iframe>
    </div> -->

  </div>

  <script>
    let darkMode = false;

    function toggleDark() {
      darkMode = !darkMode;
      const newUrl = darkMode ? 'edm-dark.html' : 'edm.html';
      document.getElementById('desktop-frame').src = newUrl;
      // document.getElementById('mobile-frame').src = newUrl;

    }

    function toggleImages() {
      darkMode = !darkMode;
      const newUrl = darkMode ? 'edm-alt.html' : 'edm.html';
      document.getElementById('desktop-frame').src = newUrl;
      // document.getElementById('mobile-frame').src = newUrl;
    }
  </script>

  <script>
const iframe = document.getElementById('desktop-frame');

iframe.addEventListener('load', () => {
  const doc = iframe.contentDocument || iframe.contentWindow.document;

  // Images
  const images = [...doc.querySelectorAll('img')].map(img => ({
    src: img.src,
    alt: img.alt
  }));

  // Links
  const links = [...doc.querySelectorAll('a')].map(a => ({
    href: a.href,
    text: a.textContent.trim()
  }));

  console.log({ images, links });
});
</script>

</body>
</html>
