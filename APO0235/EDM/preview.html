<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EDM Preview Side by Side</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #FFFFFF;
    }

    .preview-container {
      display: flex;
      gap: 20px; /* space between desktop and mobile */
      flex-wrap: wrap; /* wrap on small screens */
    }

    .iframe-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid #ccc;
      padding: 10px;
    }

    .iframe-label {
      font-weight: bold;
      margin-bottom: 5px;
    }

    iframe {
      border: 0px none;
    }

    .toggle-button {
      margin-bottom: 20px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #333;
      background: #fff;
      color: #000;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  
  <button class="toggle-button" onclick="toggleDark()">Toggle Dark Mode</button>
<button class="toggle-button" onclick="switchTo('edm')">Version 01</button>
<button class="toggle-button" onclick="switchTo('edm02')">Version 02</button>

<div class="preview-container">

  <!-- Desktop Preview -->
  <div class="iframe-wrapper">
    <span class="iframe-label" id="iframe-label-desktop">Desktop version  1</span>
    <iframe id="desktop-frame" src="edm.html" width="650" height="2240" title="Desktop EDM Preview"></iframe>
  </div>

  <!-- Mobile Preview -->
  <div class="iframe-wrapper">
    <span class="iframe-label" id="iframe-label-mobile">Mobile version 2</span>
    <iframe id="mobile-frame" src="edm.html" width="400" height="2240" title="Mobile EDM Preview"></iframe>
  </div>

</div>

<script>

let darkMode = false;
let currentVersion = 'edm';

function updateFrames() {
  const suffix = darkMode ? '-dark.html' : '.html';
  const newUrl = currentVersion + suffix;

  let version = "1"
  if(currentVersion=="edm02"){
      version = "2"
  }

  document.getElementById('iframe-label-desktop').innerHTML = 'Desktop version '+ version;
  document.getElementById('iframe-label-mobile').innerHTML = 'Desktop version '+ version;

  document.getElementById('desktop-frame').src = newUrl;
  document.getElementById('mobile-frame').src = newUrl;
}

function toggleDark() {
  darkMode = !darkMode;
  updateFrames();
}

function switchTo(version) {
  currentVersion = version;
  updateFrames();
}

</script>

</body>
</html>
